name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep "iPhone" | tail -10

      - name: Pick simulator
        id: sim
        run: |
          # Find the first available booted-or-available iPhone simulator
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid'])
                      exit()
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $UDID"
          xcrun simctl boot "$UDID" || true

      - name: Build
        run: |
          xcodebuild build \
            -scheme Elevate \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            -quiet

      - name: Test
        run: |
          xcodebuild test \
            -scheme Elevate \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -only-testing:ElevateTests \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            -quiet \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
